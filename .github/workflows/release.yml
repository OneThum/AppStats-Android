name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Build & verify
        run: |
          ./gradlew :appstats:ktlintCheck :appstats:detekt :appstats:testDebugUnitTest \
                    :appstats:assembleRelease \
                    -PVERSION_NAME=${{ steps.version.outputs.version }} --stacktrace

      # Maven Central is optional: only publish when credentials/signing secrets are
      # configured. Until the Central namespace is verified, consumers use JitPack, which
      # builds straight from the git tag and does not depend on this job.
      - name: Detect Maven Central credentials
        id: mvncheck
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
        run: |
          if [ -n "$MAVEN_CENTRAL_USERNAME" ] && [ -n "$SIGNING_IN_MEMORY_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Maven Central credentials present — will publish."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Maven Central credentials not configured — skipping Central publish. JitPack consumers are unaffected; the GitHub release + AAR are still created."
          fi

      - name: Publish to Maven Central
        if: steps.mvncheck.outputs.enabled == 'true'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          ./gradlew :appstats:publishAndReleaseToMavenCentral --no-configuration-cache \
                    -PVERSION_NAME=${{ steps.version.outputs.version }} \
                    -PRELEASE_SIGNING_ENABLED=true \
                    --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            appstats/build/outputs/aar/*.aar
